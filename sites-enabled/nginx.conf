
upstream gs {
  server geos:8080;
}

upstream nd {
  server node:3000;
}
server {
  listen      8008;
  # the domain name it will serve for
  server_name 192.168.177.187;
  #server_name _;
  #resolver 127.0.0.11;
  # max upload size, adjust to taste
  keepalive_timeout  500;
  proxy_connect_timeout       600;
  proxy_send_timeout          600;
  send_timeout                600;
  client_max_body_size        20m;
  client_header_timeout       600;
  client_body_timeout         600;
  fastcgi_read_timeout        300;
  location / {
      root /usr/share/nginx/html;
      index index.html index.htm;
  }
  location /geoserver {
      proxy_set_header Upgrade $http_upgrade;
      proxy_pass http://gs;
      #proxy_redirect localhost https://jornada.nmsu.edu;
      proxy_redirect default;
      proxy_set_header    Host            $host;
      proxy_set_header    X-Real-IP       $remote_addr;
      proxy_set_header    X-Forwarded-for $remote_addr;
      port_in_redirect off;
      proxy_connect_timeout 600;
      proxy_set_header X-Script-Name /geoserver;
      proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto      $scheme;

      # CORS headers — required for cross-origin WMS/WFS access from browser apps
      add_header 'Access-Control-Allow-Origin'  '*' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, HEAD, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' '*' always;
      add_header 'Cross-Origin-Resource-Policy' 'cross-origin' always;

      # Handle OPTIONS preflight
      if ($request_method = 'OPTIONS') {
          add_header 'Access-Control-Allow-Origin'  '*';
          add_header 'Access-Control-Allow-Methods' 'GET, POST, HEAD, OPTIONS';
          add_header 'Access-Control-Allow-Headers' '*';
          add_header 'Access-Control-Max-Age' 1728000;
          add_header 'Content-Type' 'text/plain charset=UTF-8';
          add_header 'Content-Length' 0;
          return 204;
      }
  }
  location /maps/max {
    proxy_pass http://nd/max/;
    proxy_set_header Host $host;
  }
  location /maps/min {
    proxy_pass http://nd/min/;
    proxy_set_header Host $host;
  }
  location /maps/precip {
    proxy_pass http://nd/precip/;
    proxy_set_header Host $host;
  }
  location /max {
    proxy_pass http://nd/max/;
    proxy_set_header Host $host;
  }
  location /min {
    proxy_pass http://nd/min/;
    proxy_set_header Host $host;
  }
  location /precip {
    proxy_pass http://nd/precip/;
    proxy_set_header Host $host;
      #proxy_set_header    X-Real-IP       $remote_addr;
      #proxy_set_header    X-Forwarded-for $remote_addr;
      #port_in_redirect off;
      #proxy_connect_timeout 600;
      #proxy_set_header X-Script-Name /maps/precip;
  }
  location /js {
    proxy_pass http://nd/js;
  }
  location /css {
    proxy_pass http://nd/css;
  }
  
  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
      root /usr/share/nginx/html;
  }
}
